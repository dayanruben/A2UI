name: Python CI

on:
  push:
    branches: [main]
    paths:
      - "agent_sdks/python/**"
      - "specification/**/json/**"
      - "agent_sdks/conformance/**"
      - "samples/agent/adk/**"
      - ".agents/skills/**"
      - "scripts/run_skills_tests.py"
      - ".github/workflows/python_ci.yml"
      - ".github/actions/setup-python/**"
  pull_request:
    paths:
      - "agent_sdks/python/**"
      - "specification/**/json/**"
      - "agent_sdks/conformance/**"
      - "samples/agent/adk/**"
      - ".agents/skills/**"
      - "scripts/run_skills_tests.py"
      - ".github/workflows/python_ci.yml"
      - ".github/actions/setup-python/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  agent-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-python
      - name: Install Dependencies
        run: uv sync
      - name: Check Formatting
        run: uv run pyink --check agent_sdks/python/a2ui_agent
      - name: Run Unit Tests
        run: uv run --package a2ui-agent-sdk pytest agent_sdks/python/a2ui_agent/tests
      - name: Build
        run: uv build agent_sdks/python/a2ui_agent
      - name: Verify Load Real
        run: uv run python agent_sdks/python/a2ui_agent/tests/integration/verify_load_real.py

  core-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-python
      - name: Install Dependencies
        run: uv sync
      - name: Check Formatting
        run: uv run pyink --check agent_sdks/python/a2ui_core
      - name: Run Unit Tests
        run: uv run --package a2ui-core pytest agent_sdks/python/a2ui_core/tests
      - name: Build
        run: uv build agent_sdks/python/a2ui_core

  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-python
      - name: Install Dependencies
        run: uv sync
      - name: Check Formatting
        run: uv run pyink --check agent_sdks/conformance/tests
      - name: Validate YAML Conformance
        run: uv run --package a2ui-conformance-validation pytest agent_sdks/conformance/tests

  adk-samples:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        sample: [restaurant_finder]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-python
      - name: Install Dependencies
        run: uv sync
      - name: Check Formatting
        run: uv run pyink --check samples/agent/adk
      - name: Validate Sample Examples
        run: uv run --all-packages pytest -vv samples/agent/adk/tests/test_examples_validation.py
      - name: Build Sample
        run: uv build samples/agent/adk/${{ matrix.sample }}

  skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-python
      - name: Run Skills Unit Tests
        run: python3 scripts/run_skills_tests.py
